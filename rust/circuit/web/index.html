<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shuffle Prover</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: monospace;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 { font-size: 1.4rem; letter-spacing: 0.1em; margin-bottom: 6px; color: #fff; }
    p.subtitle { font-size: 0.8rem; color: #666; margin-bottom: 32px; }

    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      padding: 10px 22px;
      font-family: monospace;
      font-size: 0.85rem;
      border: 1px solid #444;
      border-radius: 4px;
      background: #1a1a1a;
      color: #e0e0e0;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    button:hover:not(:disabled) { border-color: #aaa; color: #fff; }
    button:disabled { opacity: 0.35; cursor: not-allowed; }
    button.danger { border-color: #7a2020; color: #d06060; }
    button.danger:hover:not(:disabled) { border-color: #d06060; color: #ff8080; }

    .status {
      font-size: 0.85rem;
      min-height: 22px;
      margin-bottom: 28px;
      color: #888;
    }
    .status.ok  { color: #4caf50; }
    .status.err { color: #f44336; }

    .deck-grid {
      display: grid;
      grid-template-columns: repeat(13, 1fr);
      gap: 5px;
      max-width: 600px;
      width: 100%;
      margin-bottom: 32px;
    }

    .card {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      border: 1px solid #2a2a2a;
      border-radius: 3px;
      background: #161616;
      color: #666;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }
    .card.active { background: #1e2a1e; color: #81c784; border-color: #2d4a2d; }
    .card.tampered { background: #2a1a1a; color: #e57373; border-color: #4a2020; }

    .proof-info {
      font-size: 0.75rem;
      color: #555;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>Shuffle Prover</h1>
  <p class="subtitle">ZK proof that a deck of 52 cards is a valid permutation of 0–51</p>

  <div class="controls">
    <button id="btn-shuffle">Shuffle</button>
    <button id="btn-prove" disabled>Prove</button>
    <button id="btn-verify" disabled>Verify</button>
    <button id="btn-tamper" class="danger" disabled>Tamper</button>
  </div>

  <div class="status" id="status">Loading WASM...</div>

  <div class="deck-grid" id="deck-grid">
    <!-- 52 card cells injected by JS -->
  </div>

  <div class="proof-info" id="proof-info"></div>

  <script type="module" src="./main.js"></script>
</body>
</html>
